name: Publish AUR

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (without 'v' prefix, e.g. 0.7.0)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish-aur:
    runs-on: ubuntu-latest

    steps:
      - name: Get version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="v${{ github.event.inputs.version }}"
          fi

          VERSION="${TAG#v}"

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Validate version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [[ -z "$VERSION" ]]; then
            echo "Empty version"
            exit 1
          fi
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid version format: $VERSION (expected x.y.z)"
            exit 1
          fi

      - name: Calculate source checksum
        id: checksum
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/comicrd-${VERSION}-linux-x86_64.tar.gz"

          echo "Downloading $URL"
          curl -fsSL "$URL" -o comicrd.tar.gz || {
            echo "Failed to download source tarball. Make sure the release asset exists."
            exit 1
          }

          SHA256="$(sha256sum comicrd.tar.gz | awk '{print $1}')"
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"
          echo "SHA256: $SHA256"

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur

          cat > ~/.ssh/config <<'EOF'
          Host aur.archlinux.org
            HostName aur.archlinux.org
            User aur
            IdentityFile ~/.ssh/aur
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new
          EOF

      - name: Clone AUR repo
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if git clone ssh://aur@aur.archlinux.org/comicrd-bin.git aur-repo 2>/dev/null; then
            echo "AUR repo cloned successfully"
          else
            echo "AUR repo does not exist yet - creating new package"
            mkdir aur-repo
            cd aur-repo
            git init
            git remote add origin ssh://aur@aur.archlinux.org/comicrd-bin.git
          fi

          ls -la aur-repo/

      - name: Generate PKGBUILD
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
          SHA256: ${{ steps.checksum.outputs.sha256 }}
        run: |
          cd aur-repo

          cat > PKGBUILD <<PKGEOF
          # Maintainer: Riski Andriyanto <putra7a@gmail.com>

          pkgname=comicrd-bin
          _pkgname=comicrd
          pkgver=${VERSION}
          pkgrel=1
          pkgdesc="Lightweight high-performance desktop comic reader built with Tauri 2"
          arch=('x86_64')
          url="https://github.com/andrizan/comicRD"
          license=('MIT')
          depends=(
            'webkit2gtk-4.1'
            'gtk3'
            'libayatana-appindicator'
            'librsvg'
            'openssl'
            'hicolor-icon-theme'
          )
          provides=('comicrd')
          conflicts=('comicrd')
          source=("\${_pkgname}-\${pkgver}-linux-x86_64.tar.gz::https://github.com/andrizan/comicRD/releases/download/v\${pkgver}/comicrd-\${pkgver}-linux-x86_64.tar.gz")
          sha256sums=('${SHA256}')

          package() {
            install -Dm755 "\${srcdir}/comicrd-\${pkgver}/comicrd" "\${pkgdir}/usr/bin/comicrd"
            install -Dm644 "\${srcdir}/comicrd-\${pkgver}/comicrd.desktop" "\${pkgdir}/usr/share/applications/comicrd.desktop"

            if [ -f "\${srcdir}/comicrd-\${pkgver}/comicrd.png" ]; then
              install -Dm644 "\${srcdir}/comicrd-\${pkgver}/comicrd.png" "\${pkgdir}/usr/share/icons/hicolor/128x128/apps/comicrd.png"
            fi

            if [ -f "\${srcdir}/comicrd-\${pkgver}/LICENSE" ]; then
              install -Dm644 "\${srcdir}/comicrd-\${pkgver}/LICENSE" "\${pkgdir}/usr/share/licenses/comicrd-bin/LICENSE"
            fi
          }
          PKGEOF

          cat PKGBUILD

      - name: Generate .SRCINFO
        run: |
          docker run --rm \
            -v "$PWD/aur-repo:/pkg" \
            archlinux:latest \
            bash -lc "
              pacman -Sy --noconfirm pacman &&
              cd /pkg &&
              makepkg --printsrcinfo > .SRCINFO
            "

          cat aur-repo/.SRCINFO

      - name: Push to AUR
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cd aur-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add PKGBUILD .SRCINFO

          if git diff --cached --quiet; then
            echo "No AUR changes"
            exit 0
          fi

          git commit -m "Update to ${VERSION}"

          # retry push in case of transient failures
          for i in 1 2 3; do
            if git push origin master 2>&1; then
              echo "Push succeeded"
              exit 0
            fi
            echo "Push attempt $i failed, retrying in 10s..."
            sleep 10
          done

          echo "Push failed after 3 attempts"
          exit 1
