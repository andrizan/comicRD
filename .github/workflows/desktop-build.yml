name: Desktop Build

on:
  workflow_dispatch:
  push:
    branches: ["master"]
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.44.1"
  APP_NAME: ComicRD

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            curl \
            file \
            git \
            libdav1d-dev \
            libgtk-3-dev \
            ninja-build \
            pkg-config \
            unzip \
            xz-utils

      - name: Fetch Flutter dependencies
        working-directory: app_flutter
        run: flutter pub get

      - name: Run Rust tests
        run: cargo test

      - name: Analyze Flutter app
        working-directory: app_flutter
        run: flutter analyze

      - name: Run Flutter tests
        working-directory: app_flutter
        run: flutter test

  build-linux:
    name: Build Linux Bundle
    needs: quality
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            file \
            git \
            libdav1d-dev \
            libgtk-3-dev \
            ninja-build \
            pkg-config \
            xz-utils

      - name: Build Linux release tarball
        env:
          FLUTTER_BIN: flutter
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+([A-Za-z][0-9A-Za-z._]*|[-_][0-9A-Za-z][0-9A-Za-z._-]*)?$'; then
            if [ "${GITHUB_REF#refs/tags/}" != "$GITHUB_REF" ]; then
              echo "Invalid tag: $GITHUB_REF_NAME. Expected vX.Y.Z, vX.Y.Zsuffix, vX.Y.Z_suffix, or vX.Y.Z-suffix."
              exit 1
            fi
            VERSION="manual-${GITHUB_RUN_NUMBER}"
          fi
          ./scripts/package-linux.sh "$VERSION"

      - name: Upload Linux tarball
        uses: actions/upload-artifact@v7
        with:
          name: comicrd-linux-x86_64
          path: dist/comicrd-*-linux-x86_64.tar.gz
          if-no-files-found: error

  build-windows:
    name: Build Windows Bundle
    needs: quality
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install MSYS2 and dav1d
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-dav1d
            mingw-w64-x86_64-pkg-config

      - name: Set PKG_CONFIG_PATH for dav1d
        run: |
          echo "PKG_CONFIG_PATH=C:\msys64\mingw64\lib\pkgconfig" >> $env:GITHUB_ENV
          echo "C:\msys64\mingw64\bin" >> $env:GITHUB_PATH
        shell: pwsh

      - name: Fetch Flutter dependencies
        working-directory: app_flutter
        run: flutter pub get

      - name: Build Windows release
        working-directory: app_flutter
        run: |
          flutter pub get
          flutter build windows --release

      - name: Archive Windows bundle
        shell: pwsh
        run: |
          $Version = "${env:GITHUB_REF_NAME}" -replace '^v', ''
          if ($Version -notmatch '^\d+\.\d+\.\d+([A-Za-z][0-9A-Za-z._]*|[-_][0-9A-Za-z][0-9A-Za-z._-]*)?$') {
            if ($env:GITHUB_REF -like 'refs/tags/*') {
              Write-Error ("Invalid tag: {0}. Expected vX.Y.Z, vX.Y.Zsuffix, vX.Y.Z_suffix, or vX.Y.Z-suffix." -f $env:GITHUB_REF_NAME)
              exit 1
            }
            $Version = "manual-${env:GITHUB_RUN_NUMBER}"
          }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive `
            -Path app_flutter/build/windows/x64/runner/Release/* `
            -DestinationPath "dist/comicrd-$Version-windows-x86_64.zip" `
            -Force

      - name: Upload Windows bundle
        uses: actions/upload-artifact@v7
        with:
          name: comicrd-windows-x86_64
          path: dist/comicrd-*-windows-x86_64.zip
          if-no-files-found: error

  build-macos:
    name: Build macOS Bundle
    needs: quality
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dav1d
        run: brew install dav1d pkg-config

      - name: Fetch Flutter dependencies
        working-directory: app_flutter
        run: flutter pub get

      - name: Build macOS release
        working-directory: app_flutter
        run: |
          flutter pub get
          flutter build macos --release

      - name: Archive macOS bundle
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+([A-Za-z][0-9A-Za-z._]*|[-_][0-9A-Za-z][0-9A-Za-z._-]*)?$'; then
            if [ "${GITHUB_REF#refs/tags/}" != "$GITHUB_REF" ]; then
              echo "Invalid tag: $GITHUB_REF_NAME. Expected vX.Y.Z, vX.Y.Zsuffix, vX.Y.Z_suffix, or vX.Y.Z-suffix."
              exit 1
            fi
            VERSION="manual-${GITHUB_RUN_NUMBER}"
          fi
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent \
            app_flutter/build/macos/Build/Products/Release/ComicRD.app \
            "dist/comicrd-${VERSION}-macos.zip"

      - name: Upload macOS bundle
        uses: actions/upload-artifact@v7
        with:
          name: comicrd-macos
          path: dist/comicrd-*-macos.zip
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs:
      - build-linux
      - build-windows
      - build-macos
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-artifacts

      - name: Collect release files
        run: |
          set -euo pipefail
          mkdir -p release-upload
          find release-artifacts -type f \( \
            -name "*.tar.gz" -o \
            -name "*.zip" \
          \) -exec cp -v {} release-upload/ \;
          ls -la release-upload
          test "$(find release-upload -maxdepth 1 -type f | wc -l)" -gt 0

      - name: Resolve release metadata
        id: release-metadata
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          if echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v3
        with:
          name: ComicRD ${{ github.ref_name }}
          files: release-upload/*
          fail_on_unmatched_files: true
          generate_release_notes: true
          prerelease: ${{ steps.release-metadata.outputs.prerelease }}

  publish-aur:
    name: Publish to AUR
    needs: release
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-') && !contains(github.ref_name, '_')
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+([A-Za-z][0-9A-Za-z._]*)?$'; then
            echo "Invalid tag: $TAG. Expected vX.Y.Z or vX.Y.Zsuffix."
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download Linux tarball checksum
        id: checksum
        env:
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/comicrd-${VERSION}-linux-x86_64.tar.gz"
          curl -fsSL "$URL" -o comicrd-linux.tar.gz
          SHA256="$(sha256sum comicrd-linux.tar.gz | awk '{print $1}')"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Install SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          cat > ~/.ssh/config <<'EOF'
          Host aur.archlinux.org
            HostName aur.archlinux.org
            User aur
            IdentityFile ~/.ssh/aur
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new
          EOF

      - name: Clone AUR repository
        run: |
          set -euo pipefail
          git clone ssh://aur@aur.archlinux.org/comicrd-bin.git aur-repo

      - name: Generate PKGBUILD
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA256: ${{ steps.checksum.outputs.sha256 }}
        run: |
          set -euo pipefail
          cd aur-repo
          cat > PKGBUILD <<PKGEOF
          # Maintainer: Riski Andriyanto <putra7a@gmail.com>

          pkgname=comicrd-bin
          _pkgname=comicrd
          pkgver=${VERSION}
          pkgrel=1
          pkgdesc="ComicRD desktop comic reader built with Flutter and Rust"
          arch=('x86_64')
          url="https://github.com/${GITHUB_REPOSITORY}"
          license=('MIT')
          depends=(
            'gcc-libs'
            'glib2'
            'glibc'
            'gtk3'
            'hicolor-icon-theme'
            'libepoxy'
          )
          provides=('comicrd')
          conflicts=('comicrd')
          source=("\${_pkgname}-\${pkgver}-linux-x86_64.tar.gz::https://github.com/${GITHUB_REPOSITORY}/releases/download/v\${pkgver}/comicrd-\${pkgver}-linux-x86_64.tar.gz")
          sha256sums=('${SHA256}')

          package() {
            cp -R --no-preserve=ownership "\${srcdir}/comicrd-\${pkgver}-linux-x86_64/opt" "\${pkgdir}/"
            install -dm755 "\${pkgdir}/usr/bin"
            ln -sf /opt/comicrd/ComicRD "\${pkgdir}/usr/bin/comicrd"
            install -Dm644 "\${srcdir}/comicrd-\${pkgver}-linux-x86_64/usr/share/applications/comicrd.desktop" "\${pkgdir}/usr/share/applications/comicrd.desktop"
            install -Dm644 "\${srcdir}/comicrd-\${pkgver}-linux-x86_64/usr/share/icons/hicolor/512x512/apps/comicrd.png" "\${pkgdir}/usr/share/icons/hicolor/512x512/apps/comicrd.png"

            if [ -f "\${srcdir}/comicrd-\${pkgver}-linux-x86_64/usr/share/licenses/comicrd-bin/LICENSE" ]; then
              install -Dm644 "\${srcdir}/comicrd-\${pkgver}-linux-x86_64/usr/share/licenses/comicrd-bin/LICENSE" "\${pkgdir}/usr/share/licenses/comicrd-bin/LICENSE"
            fi
          }
          PKGEOF

      - name: Generate .SRCINFO
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD/aur-repo:/aur-src:ro" \
            archlinux:latest \
            bash -lc "
              pacman -Syu --noconfirm base-devel >/dev/null &&
              useradd -m builder &&
              install -d -o builder -g builder /pkg &&
              install -m 644 /aur-src/PKGBUILD /pkg/PKGBUILD &&
              chown builder:builder /pkg/PKGBUILD &&
              su builder -c 'cd /pkg && makepkg --printsrcinfo'
            " > aur-repo/.SRCINFO
          cat aur-repo/.SRCINFO

      - name: Push to AUR
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          cd aur-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
            echo "No AUR changes"
            exit 0
          fi
          git commit -m "Update to ${VERSION}"
          git push origin master
