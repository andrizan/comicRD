name: Desktop Build

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-deb-rpm
            os: ubuntu-24.04
            rust_targets: x86_64-unknown-linux-gnu
            script: tauri:build:linux
            artifact_name: comicrd-linux-deb-rpm
            artifact_paths: |
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm

          - name: linux-appimage
            os: ubuntu-24.04
            rust_targets: x86_64-unknown-linux-gnu
            script: tauri:build:linux:appimage
            artifact_name: comicrd-linux-appimage
            artifact_paths: |
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage

          - name: windows
            os: windows-latest
            rust_targets: x86_64-pc-windows-msvc
            script: tauri:build:windows
            artifact_name: comicrd-windows
            artifact_paths: |
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

          - name: macos
            os: macos-latest
            rust_targets: x86_64-apple-darwin,aarch64-apple-darwin
            script: tauri:build:macos
            artifact_name: comicrd-macos
            artifact_paths: |
              src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
              src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz.sig

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            rpm

          if apt-cache show libfuse2t64 >/dev/null 2>&1; then
            sudo apt-get install -y libfuse2t64
          else
            sudo apt-get install -y libfuse2
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Desktop Bundle
        run: pnpm run ${{ matrix.script }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error

  arch-package:
    name: Build Arch/CachyOS Package
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    container:
      image: archlinux:latest

    steps:
      - name: Install Arch build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            base-devel \
            git \
            nodejs \
            pnpm \
            rust \
            curl \
            wget \
            file \
            openssl \
            appmenu-gtk-module \
            gtk3 \
            webkit2gtk-4.1 \
            libayatana-appindicator \
            librsvg \
            xdotool \
            patchelf \
            desktop-file-utils

      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare build user
        run: |
          useradd -m builder
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Install dependencies
        run: |
          su builder -c "cd '$GITHUB_WORKSPACE' && pnpm install --frozen-lockfile"

      - name: Build frontend and Rust binary
        run: |
          su builder -c "cd '$GITHUB_WORKSPACE' && pnpm build"
          su builder -c "cd '$GITHUB_WORKSPACE/src-tauri' && cargo build --release --target x86_64-unknown-linux-gnu"

      - name: Build pacman package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PKGDIR="$GITHUB_WORKSPACE/pkgbuild"

          mkdir -p "$PKGDIR"
          chown -R builder:builder "$PKGDIR"

          cat > "$PKGDIR/PKGBUILD" <<EOF
          pkgname=comicrd-bin
          pkgver=$VERSION
          pkgrel=1
          pkgdesc="ComicRD desktop app"
          arch=('x86_64')
          url="https://github.com/${GITHUB_REPOSITORY}"
          license=('custom')
          depends=(
            'webkit2gtk-4.1'
            'gtk3'
            'libayatana-appindicator'
            'librsvg'
            'openssl'
          )
          source=()
          sha256sums=()

          package() {
            install -Dm755 "\$startdir/../src-tauri/target/x86_64-unknown-linux-gnu/release/app" "\$pkgdir/usr/bin/comicrd"

            install -Dm644 /dev/stdin "\$pkgdir/usr/share/applications/comicrd.desktop" <<DESKTOP
          [Desktop Entry]
          Type=Application
          Name=ComicRD
          Comment=ComicRD Desktop App
          Exec=comicrd
          Icon=comicrd
          Terminal=false
          Categories=Utility;
          DESKTOP

            if [ -f "\$startdir/../src-tauri/icons/128x128.png" ]; then
              install -Dm644 "\$startdir/../src-tauri/icons/128x128.png" "\$pkgdir/usr/share/icons/hicolor/128x128/apps/comicrd.png"
            fi
          }
          EOF

          chown -R builder:builder "$PKGDIR"
          su builder -c "cd '$PKGDIR' && makepkg -f --clean"

      - name: Upload Arch package artifact
        uses: actions/upload-artifact@v6
        with:
          name: comicrd-arch-cachyos
          path: |
            pkgbuild/*.pkg.tar.zst
            pkgbuild/PKGBUILD
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs:
      - build
      - arch-package
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-artifacts

      - name: Show release files
        run: find release-artifacts -type f -maxdepth 6 -print

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v3
        with:
          name: ComicRD ${{ github.ref_name }}
          files: |
            release-artifacts/**/*.deb
            release-artifacts/**/*.rpm
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.msi
            release-artifacts/**/*.exe
            release-artifacts/**/*.dmg
            release-artifacts/**/*.tar.gz
            release-artifacts/**/*.sig
            release-artifacts/**/*.pkg.tar.zst
            release-artifacts/**/PKGBUILD
          fail_on_unmatched_files: true
          generate_release_notes: true
