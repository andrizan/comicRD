name: Desktop Build

on:
  workflow_dispatch:
  push:
    branches: ["master"]
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-deb-rpm
            os: ubuntu-24.04
            rust_targets: x86_64-unknown-linux-gnu
            script: tauri:build:linux
            artifact_name: comicrd-linux-deb-rpm
            artifact_paths: |
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm

          - name: linux-appimage
            os: ubuntu-24.04
            rust_targets: x86_64-unknown-linux-gnu
            script: tauri:build:linux:appimage
            artifact_name: comicrd-linux-appimage
            artifact_paths: |
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage

          - name: windows
            os: windows-latest
            rust_targets: x86_64-pc-windows-msvc
            script: tauri:build:windows
            artifact_name: comicrd-windows
            artifact_paths: |
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

          - name: macos
            os: macos-latest
            rust_targets: x86_64-apple-darwin,aarch64-apple-darwin
            script: tauri:build:macos
            artifact_name: comicrd-macos
            artifact_paths: |
              src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            rpm

          if apt-cache show libfuse2t64 >/dev/null 2>&1; then
            sudo apt-get install -y libfuse2t64
          else
            sudo apt-get install -y libfuse2
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate macOS .icns icon
        if: runner.os == 'macOS'
        run: |
          ICONSET="src-tauri/icons/icon.iconset"
          mkdir -p "$ICONSET"
          for size in 16 32 64 128 256 512; do
            sips -z $size $size src-tauri/icons/icon.png --out "$ICONSET/icon_${size}x${size}.png" >/dev/null
            double=$((size * 2))
            sips -z $double $double src-tauri/icons/icon.png --out "$ICONSET/icon_${size}x${size}@2x.png" >/dev/null
          done
          iconutil -c icns "$ICONSET" -o src-tauri/icons/icon.icns
          rm -rf "$ICONSET"

      - name: Build Desktop Bundle
        run: pnpm run ${{ matrix.script }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error

  arch-package:
    name: Build Arch/CachyOS Package
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    container:
      image: archlinux:latest

    steps:
      - name: Install Arch build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            base-devel \
            git \
            rust \
            curl \
            wget \
            file \
            openssl \
            gtk3 \
            webkit2gtk-4.1 \
            libayatana-appindicator \
            librsvg \
            xdotool \
            patchelf \
            desktop-file-utils

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Prepare build user
        run: |
          useradd -m builder
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Install dependencies
        run: |
          su builder -c "cd '$GITHUB_WORKSPACE' && pnpm install --frozen-lockfile"

      - name: Build Tauri binary without bundling
        run: |
          su builder -c "cd '$GITHUB_WORKSPACE' && pnpm tauri build --target x86_64-unknown-linux-gnu --no-bundle"

      - name: Create Arch source tarball and PKGBUILD
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME#v}"
          PKGDIR="$GITHUB_WORKSPACE/pkgbuild"
          SRCDIR="$PKGDIR/src/comicrd-$VERSION"

          mkdir -p "$SRCDIR"

          install -Dm755 \
            "$GITHUB_WORKSPACE/src-tauri/target/x86_64-unknown-linux-gnu/release/comicrd" \
            "$SRCDIR/comicrd"

          cat > "$SRCDIR/comicrd.desktop" <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=ComicRD
          Comment=ComicRD Desktop App
          Exec=comicrd
          Icon=comicrd
          Terminal=false
          Categories=Utility;
          EOF

          if [ -f "$GITHUB_WORKSPACE/src-tauri/icons/128x128.png" ]; then
            install -Dm644 \
              "$GITHUB_WORKSPACE/src-tauri/icons/128x128.png" \
              "$SRCDIR/comicrd.png"
          fi

          if [ -f "$GITHUB_WORKSPACE/LICENSE" ]; then
            install -Dm644 "$GITHUB_WORKSPACE/LICENSE" "$SRCDIR/LICENSE"
          fi

          cd "$PKGDIR/src"
          tar -czf "$PKGDIR/comicrd-$VERSION-linux-x86_64.tar.gz" "comicrd-$VERSION"

          SHA256="$(sha256sum "$PKGDIR/comicrd-$VERSION-linux-x86_64.tar.gz" | awk '{print $1}')"

          cat > "$PKGDIR/PKGBUILD" <<EOF
          pkgname=comicrd-bin
          pkgver=$VERSION
          pkgrel=1
          pkgdesc="ComicRD desktop app"
          arch=('x86_64')
          url="https://github.com/${GITHUB_REPOSITORY}"
          license=('custom')
          depends=(
            'webkit2gtk-4.1'
            'gtk3'
            'libayatana-appindicator'
            'librsvg'
            'openssl'
            'hicolor-icon-theme'
          )
          provides=('comicrd')
          conflicts=('comicrd')
          source=("comicrd-\${pkgver}-linux-x86_64.tar.gz::https://github.com/${GITHUB_REPOSITORY}/releases/download/v\${pkgver}/comicrd-\${pkgver}-linux-x86_64.tar.gz")
          sha256sums=('$SHA256')

          package() {
            install -Dm755 "\${srcdir}/comicrd-\${pkgver}/comicrd" "\${pkgdir}/usr/bin/comicrd"
            install -Dm644 "\${srcdir}/comicrd-\${pkgver}/comicrd.desktop" "\${pkgdir}/usr/share/applications/comicrd.desktop"

            if [ -f "\${srcdir}/comicrd-\${pkgver}/comicrd.png" ]; then
              install -Dm644 "\${srcdir}/comicrd-\${pkgver}/comicrd.png" "\${pkgdir}/usr/share/icons/hicolor/128x128/apps/comicrd.png"
            fi

            if [ -f "\${srcdir}/comicrd-\${pkgver}/LICENSE" ]; then
              install -Dm644 "\${srcdir}/comicrd-\${pkgver}/LICENSE" "\${pkgdir}/usr/share/licenses/comicrd-bin/LICENSE"
            fi
          }
          EOF

          chown -R builder:builder "$PKGDIR"

      - name: Build pacman package
        run: |
          # Arch container may have SRCDEST pointing elsewhere (e.g. /var/cache).
          # Set it to . so makepkg finds the local tarball instead of downloading
          # from the release URL (which doesn't exist yet).
          su builder -c "cd '$GITHUB_WORKSPACE/pkgbuild' && SRCDEST=. makepkg -f --clean --skipinteg"

      - name: Upload Arch package artifact
        uses: actions/upload-artifact@v7
        with:
          name: comicrd-arch-cachyos
          path: |
            pkgbuild/*.pkg.tar.zst
            pkgbuild/comicrd-*-linux-x86_64.tar.gz
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs:
      - build
      - arch-package
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-artifacts

      - name: Collect release files
        run: |
          set -euo pipefail

          mkdir -p release-upload

          find release-artifacts -type f \( \
            -name "*.deb" -o \
            -name "*.rpm" -o \
            -name "*.AppImage" -o \
            -name "*.msi" -o \
            -name "*.exe" -o \
            -name "*.dmg" -o \
            -name "*.pkg.tar.zst" -o \
            -name "*.tar.gz" \
          \) -exec cp -v {} release-upload/ \;

          echo "Release files:"
          ls -la release-upload/

          FILE_COUNT="$(find release-upload -type f -maxdepth 1 | wc -l)"
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "No release files found."
            exit 1
          fi

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v3
        with:
          name: ComicRD ${{ github.ref_name }}
          files: release-upload/*
          fail_on_unmatched_files: true
          generate_release_notes: true

  publish-aur:
    name: Publish to AUR
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Get version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          if [[ -z "$VERSION" ]]; then
            echo "Empty version"
            exit 1
          fi
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid version format: $VERSION (expected x.y.z)"
            exit 1
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download tarball and calculate checksum
        id: checksum
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/comicrd-${VERSION}-linux-x86_64.tar.gz"
          echo "Downloading $URL"
          curl -fsSL "$URL" -o comicrd.tar.gz || {
            echo "Failed to download source tarball. Make sure the release asset exists."
            exit 1
          }
          SHA256="$(sha256sum comicrd.tar.gz | awk '{print $1}')"
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"
          echo "SHA256: $SHA256"

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          cat > ~/.ssh/config <<'EOF'
          Host aur.archlinux.org
            HostName aur.archlinux.org
            User aur
            IdentityFile ~/.ssh/aur
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new
          EOF

      - name: Clone AUR repo
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if git clone ssh://aur@aur.archlinux.org/comicrd-bin.git aur-repo 2>/dev/null; then
            echo "AUR repo cloned successfully"
          else
            echo "AUR repo does not exist yet - creating new package"
            mkdir aur-repo
            cd aur-repo
            git init
            git remote add origin ssh://aur@aur.archlinux.org/comicrd-bin.git
          fi
          ls -la aur-repo/

      - name: Generate AUR PKGBUILD
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
          SHA256: ${{ steps.checksum.outputs.sha256 }}
        run: |
          cd aur-repo

          cat > PKGBUILD <<PKGEOF
          # Maintainer: Riski Andriyanto <putra7a@gmail.com>

          pkgname=comicrd-bin
          _pkgname=comicrd
          pkgver=${VERSION}
          pkgrel=1
          pkgdesc="Lightweight high-performance desktop comic reader built with Tauri 2"
          arch=('x86_64')
          url="https://github.com/${GITHUB_REPOSITORY}"
          license=('MIT')
          depends=(
            'webkit2gtk-4.1'
            'gtk3'
            'libayatana-appindicator'
            'librsvg'
            'openssl'
            'hicolor-icon-theme'
          )
          provides=('comicrd')
          conflicts=('comicrd')
          source=("\${_pkgname}-\${pkgver}-linux-x86_64.tar.gz::https://github.com/${GITHUB_REPOSITORY}/releases/download/v\${pkgver}/comicrd-\${pkgver}-linux-x86_64.tar.gz")
          sha256sums=('${SHA256}')

          package() {
            install -Dm755 "\${srcdir}/comicrd-\${pkgver}/comicrd" "\${pkgdir}/usr/bin/comicrd"
            install -Dm644 "\${srcdir}/comicrd-\${pkgver}/comicrd.desktop" "\${pkgdir}/usr/share/applications/comicrd.desktop"

            if [ -f "\${srcdir}/comicrd-\${pkgver}/comicrd.png" ]; then
              install -Dm644 "\${srcdir}/comicrd-\${pkgver}/comicrd.png" "\${pkgdir}/usr/share/icons/hicolor/128x128/apps/comicrd.png"
            fi

            if [ -f "\${srcdir}/comicrd-\${pkgver}/LICENSE" ]; then
              install -Dm644 "\${srcdir}/comicrd-\${pkgver}/LICENSE" "\${pkgdir}/usr/share/licenses/comicrd-bin/LICENSE"
            fi
          }
          PKGEOF

          cat PKGBUILD

      - name: Generate .SRCINFO
        run: |
          docker run --rm \
            -v "$PWD/aur-repo:/aur-src:ro" \
            archlinux:latest \
            bash -lc "
              useradd -m builder &&
              install -d -o builder -g builder /pkg &&
              install -m 644 /aur-src/PKGBUILD /pkg/PKGBUILD &&
              chown builder:builder /pkg/PKGBUILD &&
              su builder -c 'cd /pkg && makepkg --printsrcinfo'
            " > aur-repo/.SRCINFO
          cat aur-repo/.SRCINFO

      - name: Push to AUR
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cd aur-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add PKGBUILD .SRCINFO

          if git diff --cached --quiet; then
            echo "No AUR changes"
            exit 0
          fi

          git commit -m "Update to ${VERSION}"

          for i in 1 2 3; do
            if git push origin master 2>&1; then
              echo "Push succeeded"
              exit 0
            fi
            echo "Push attempt $i failed, retrying in 10s..."
            sleep 10
          done

          echo "Push failed after 3 attempts"
          exit 1
